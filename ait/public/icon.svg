<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Toss-blue full-bleed background (launcher masks corners) -->
  <rect width="1024" height="1024" fill="#3182F6"/>

  <!-- White rounded container -->
  <rect x="182" y="182" width="660" height="660" rx="150" fill="#FFFFFF"/>

  <!-- 2x2 category tiles: To Do (blue), To Pay (orange), To Buy (emerald), To Think (violet) -->
  <g>
    <rect x="272" y="272" width="220" height="220" rx="56" fill="#3B82F6"/>
    <rect x="532" y="272" width="220" height="220" rx="56" fill="#F97316"/>
    <rect x="272" y="532" width="220" height="220" rx="56" fill="#10B981"/>
    <rect x="532" y="532" width="220" height="220" rx="56" fill="#8B5CF6"/>
  </g>

  <!-- White check on the first (To Do) tile to signal a checklist -->
  <path d="M330 384 l40 40 l70 -78" fill="none" stroke="#FFFFFF" stroke-width="30"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
